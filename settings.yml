# settings.yml — Global Conflict Risk Monitor (Rust)
# Calibrated: 2026-03-31 (v2 bands re-anchored 2026-06-09; CALIBRATION TARGETS below synced to
#             backtest.rs, which is the single source of truth for the fitted bands)
#
# STRUCTURE NOTE: This file is parsed directly into the Rust Settings struct.
# Valid top-level keys: regime_factors, alerts, ingestion, dashboard, llm.
# Unknown/typo'd keys are now a PARSE ERROR (serde deny_unknown_fields): load_settings logs it
# and falls back to defaults rather than silently dropping the key onto a worse default.
# Missing optional keys use built-in defaults.
#
# REGIME MULTIPLIER METHOD:
#   Factors encode STRUCTURAL conditions stable over months-to-years.
#   They are multiplied (not summed) — conditionally independent amplifiers.
#   The news-signal Bayesian layer captures acute daily events separately.
#   Do not add a factor for something the domain scoring layer already captures.
#
#   Current product (active factors only):
#   1.4 × 1.4 × 1.2 × 0.7 × 1.4 × 1.2 × 1.15 × 1.3 × 1.2 × 1.1 = 5.46×
#
#   v2 MECHANISM (the old "Adjusted prior: 0.000987 × 5.46" line was v1 and is wrong):
#   The v2 engine holds the prior FLAT at BASELINE_ANNUAL = HISTORICAL_ANCHOR = 0.015
#   (1.5%/yr). The regime product does NOT multiply into the prior. Instead its excess
#   above the neutral 1.0× drives guardrail collapse on the systemic likelihood L_sys
#   (guardrail_from_regime, bounded by GUARDRAIL_AMPLIFIER, saturating at the
#   GUARDRAIL_REGIME_SPAN). See methodology.html and bayesian.rs.
#
# CALIBRATION TARGETS (v2 — fitted band CENTRES enforced by backtest.rs::calibration_anchors
# plus the quiet < Ukraine < current < Cuba ordering test. Descriptive only; backtest.rs is
# the source of truth. The old v1 figures here were ~2x low and contradicted the harness):
#   Quiet world                                       → ~2%  annual  (band ~0.5–5%)
#   Ukraine Feb 2022 (one theater, full war)          → ~39% annual  (band ~30–50%)
#   Current world 2026 (idealised 3-theater, no brink)→ ~60% annual  (band ~55–75%)
#   Cuba Oct 1962 (direct US–USSR nuclear brink, apex)→ ~80% annual  (band ~70–90%)
#   The LIVE 2026 operating point runs higher still (≥5 entangled theaters, Article-5 live);
#   see backtest.rs live_* analogs.

# ── Alert thresholds ──────────────────────────────────────────────────────────
# elevated: 2.5% — above the structural floor; worth monitoring
# critical: 8.0% — lights the CRITICAL banner. NOT "rare": on the v2 P scale the present world
#           (~60–80%+) sits far above this BY DESIGN, so the banner is expected to be lit in the
#           current era — it marks acute-crisis territory, not an anomaly.
# thirty_day_warn: 1.0% — 30-day window threshold for early warning sub-banner
alerts:
  elevated:       0.025
  critical:       0.08
  thirty_day_warn: 0.01

# ── LLM Enrichment (v2: structured extraction + analyst brief) ───────────────
# Local LLM via Ollama. v2 upgrades:
#   • Structured event extraction (actor→action→target, theater, signed escalation
#     step, severity, 5 modality scores) instead of plain 8-domain re-scoring.
#   • The enricher runs in a bounded concurrent worker pool (no longer serializes
#     the pipeline — was the dominant backend bottleneck).
#   • A periodic analyst-brief task writes a prose brief, served at /api/brief.
# Setup (one-time):
#   curl -fsSL https://ollama.com/install.sh | sh
#   ollama pull qwen2.5:7b
#   ollama pull nomic-embed-text   # only if semantic_dedup: true
# Falls back silently to keyword-only (and a templated brief) if Ollama is down.
#
# PERFORMANCE — use the machine. The enricher runs `concurrency` LLM extractions in
# parallel (a Semaphore-bounded worker pool), so model latency never serializes the
# pipeline. For real parallelism Ollama must also be allowed to serve that many
# requests at once — set this on the Ollama side (systemd drop-in or env):
#     OLLAMA_NUM_PARALLEL=8        # match `concurrency` below
#     OLLAMA_KEEP_ALIVE=-1         # keep the model resident (no cold reloads)
#     OLLAMA_FLASH_ATTENTION=1     # faster attention on supported GPUs
# Then: sudo systemctl restart ollama
llm:
  enabled: true            # AI on by default (structured extraction + analyst brief)
  endpoint: "http://localhost:11434"
  model: "qwen2.5:7b"
  # concurrency — parallel LLM extraction calls; keep EQUAL to OLLAMA_NUM_PARALLEL.
  # 2 on this 8GB GTX 1080: more spills qwen2.5:7b's KV cache to CPU (with the embed
  # model also resident) and doubles latency. Raise only if the GPU has VRAM headroom.
  concurrency: 2
  # embed_model — embeddings model for semantic_dedup (only used when enabled below).
  embed_model: "nomic-embed-text"
  # semantic_dedup — embedding-based same-event dedup of paraphrased headlines.
  # Off by default: it adds a 2nd Ollama call per article, which TRADES throughput for
  # dedup quality. Turn on only if your GPU has headroom; requires `ollama pull
  # nomic-embed-text`.
  semantic_dedup: true     # nomic-embed-text pulled 2026-06-07; both models stay GPU-resident (no thrash)
  # 20s (raised from 12): under burst, 2 concurrent classifies share the GPU and each
  # stretches to ~12s; 12s timed a few out (Ollama 500) → silent keyword fallback. 20s
  # lets them finish. Uncontended calls are ~6s, so this only bites during bursts.
  timeout_secs: 20

# ── Ingestion ─────────────────────────────────────────────────────────────────
# poll_interval_seconds: base tick for the aggregator
#   Aggregator fires every poll_interval × 1    (1s → 1s cycle)
#   RSS loop fires every poll_interval × 10     (1s → 10s cycle)
#   GNews loop fires every poll_interval × 20   (1s → 20s cycle)
#   GDELT loop fires every poll_interval × 30   (1s → 30s cycle)
ingestion:
  poll_interval_seconds: 1
  max_events_per_batch:  10000

# ── Dashboard ─────────────────────────────────────────────────────────────────
# host: 0.0.0.0 listens on all interfaces (change to 127.0.0.1 for local-only)
# port: default 8000 — change if port is already in use
dashboard:
  host: "0.0.0.0"
  port: 8000
  # base_path: URL prefix under which the dashboard is served.
  # Use "/" or omit for root. Set to "/risk" to serve at raithe.ca/risk.
  base_path: "/risk"
  # Operator key — required for /api/regime/* and /api/operator/* endpoints.
  # NOTE: the value below is a REAL generated secret (openssl rand -hex 32), not a
  # placeholder — the startup blocklist (INSECURE_KEYS in main.rs) does NOT match it,
  # so the operator API is LIVE with this key (it is not disabled).
  # SECURITY: this file is committed to a PUBLIC repo, so this key is publicly readable.
  # Rotate it and load the real key OUT of version control (env var / gitignored
  # override) before relying on operator-endpoint auth. Generate one with:
  # openssl rand -hex 32. If left empty, all operator endpoints return 403 Forbidden.
  operator_key: "25a32691176840ea05d1d2455895569877f5eaba2aa7129873f06b53ef520526"

# ── Regime factors ────────────────────────────────────────────────────────────
# Each factor:
#   id          — machine identifier (snake_case, unique)
#   label       — human-readable description shown in logs
#   multiplier  — structural amplifier (>1 raises risk, <1 reduces it)
#   active      — true = included in product; false = standby (activate as needed)
#
# WHEN TO EDIT:
#   - Set active: false when the structural condition resolves durably
#   - Adjust multiplier only on quarterly recalibration or major doctrine change
#   - Add a new factor only for a novel structural condition not captured by news scoring
#   - Always verify the product of active multipliers matches the header comment above

regime_factors:

  # ── ACTIVE KINETIC CONFLICT ─────────────────────────────────────────────────
  - id: active_superpower_war
    label: "Active US kinetic war (Operation Epic Fury — US/Israel vs Iran)"
    multiplier: 1.4
    active: true
    # Disable when: ceasefire holding >30 days and Strait of Hormuz fully reopened

  # ── NUCLEAR AND ARMS CONTROL ────────────────────────────────────────────────
  - id: arms_control_dead
    label: "Global arms control and nonproliferation framework collapsed"
    multiplier: 1.4
    active: true
    # New START suspended, INF dead, JCPOA destroyed during active negotiations.
    # Disable when: new bilateral or multilateral treaty ratified and in force.

  - id: dprk_nuclear_irreversible
    label: "DPRK nuclear status constitutionally irreversible; expansion underway"
    multiplier: 1.2
    active: true
    # Kim Mar 23 2026: nuclear status "absolutely irreversible."
    # Raise to 1.35 if 7th nuclear test confirmed; disable if verifiable denuclearization.

  - id: deterrence_structural_intact
    label: "Nuclear deterrence (MAD) structurally intact — risk reducer"
    multiplier: 0.7
    active: true
    # Genuine risk reducer. Retain unless: US formally abrogates Article 5 (→ 0.6),
    # any nuclear detonation (→ 0.5), or US withdraws nuclear umbrella from Japan/ROK.

  # ── EUROPE / RUSSIA ─────────────────────────────────────────────────────────
  - id: war_in_europe_year5
    label: "Active conventional war in Europe — Ukraine, year 5"
    multiplier: 1.4
    active: true
    # First conventional war in Europe involving a nuclear power since 1945.
    # Disable when: verified ceasefire holding >60 days with international monitors.

  - id: russia_hybrid_nato
    label: "Systematic Russian hybrid warfare campaign against NATO states"
    multiplier: 1.2
    active: true
    # GLOBSEC Mar 2026: 4× increase in Russian sabotage across Europe in 2024.
    # Disable when: documented 50%+ reduction in sabotage incidents over 90 days.

  - id: russia_nuclear_doctrine_compellence
    label: "Russia shifting nuclear doctrine from deterrence to compellence"
    multiplier: 1.15
    active: true
    # RealClearDefense Mar 9 2026: Russia moving toward offensive deterrence.
    # Disable when: Russia publicly reaffirms defensive-only nuclear doctrine.

  # ── ASIA-PACIFIC ─────────────────────────────────────────────────────────────
  - id: taiwan_south_china_sea_rising
    label: "Taiwan Strait and South China Sea strategic competition intensifying"
    multiplier: 1.3
    active: true
    # CFR 2026: Taiwan Strait crisis rated "even chance" by US foreign policy experts.
    # Reduce to 1.2 if Trump-Xi summit produces binding commitments.
    # Raise to 1.5 if PLA blockade exercises conducted.

  # ── SYSTEMIC / INSTITUTIONAL ─────────────────────────────────────────────────
  - id: us_institutional_norm_erosion
    label: "US institutional norm erosion — unpredictable superpower behavior"
    multiplier: 1.2
    active: true
    # US struck Iran Feb 28 2026 without congressional authorization, during
    # active diplomacy. Affects adversary ability to model US behavior.
    # Disable when: institutional checks meaningfully restored.

  # ── CYBER / INFORMATION ──────────────────────────────────────────────────────
  - id: cyber_info_warfare
    label: "State-sponsored cyber and information warfare normalized"
    multiplier: 1.1
    active: true
    # Conservative structural background condition — not an acute escalation driver.
    # Disable when: binding international cyber norms framework ratified.

  # ── INACTIVE STANDBY FACTORS ─────────────────────────────────────────────────
  # Activate these by changing active: false → active: true as conditions change.

  - id: dprk_7th_nuclear_test
    label: "DPRK conducts 7th nuclear test"
    multiplier: 1.35
    active: false
    # Activate if: seismic event consistent with nuclear test at Punggye-ri
    # confirmed by CTBTO or USGS.

  - id: russia_nato_kinetic
    label: "Russia conducts kinetic attack on NATO member state territory"
    multiplier: 1.6
    active: false
    # Activate if: confirmed kinetic Russian attack on NATO member territory
    # (not airspace violation or sabotage — those are already in russia_hybrid_nato).

  - id: nuclear_weapon_detonated
    label: "Nuclear weapon detonated — any state, any yield"
    multiplier: 2.5
    active: false
    # Activate if: confirmed detonation by any state actor (CTBTO, USGS, or
    # credible government statements). Also reduce deterrence_structural_intact
    # multiplier to 0.5 simultaneously.

  - id: ceasefire_iran_durable
    label: "Durable ceasefire in Iran war — 30+ days holding"
    multiplier: 0.7
    active: false
    # Activate AND disable active_superpower_war if ceasefire holds >30 days
    # and Strait of Hormuz fully reopened.
    # Net effect: multiplier product drops from ~5.46 to ~2.73.
